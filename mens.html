<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HPB SEO MEN" />
<title>HPB SEO Helper MEN's - AITOKYO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Hiragino Sans", "Noto Sans JP", -apple-system, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
  textarea { font-family: inherit; }
  html, body { overscroll-behavior-y: contain; }
</style>
</head>
<body class="bg-zinc-950">
<div id="app"></div>
<script>
const wordBank = {
  "🔥AITOKYO実績": [
    "ツイストシャドウパーマ", "波巻きツイストスパイラルパーマ",
    "ハイライトグランジサーフカール"
  ],
  "エリア": ["渋谷", "渋谷メンズ", "名古屋", "名古屋メンズ"],
  "基本タグ": ["men's", "メンズ", "メンズパーマ", "メンズカット", "メンズカラー", "学割U24", "メンズ似合わせカット"],
  "スタイル系(2026春トレンド)": [
    "メンズマッシュ", "シースルーマッシュ", "軽めマッシュ",
    "韓国風マッシュ", "韓流マッシュ", "韓国風メンズ",
    "センターパート", "シースルーセンターパート",
    "リバースセンターパート", "サイドパート",
    "ナチュラルツーブロック", "ツーブロック",
    "ナチュラルアップバング", "ハーフアップバング",
    "ベリーショート", "スパイキーショート",
    "フェザーカット", "フレンチクロップ",
    "サンウォンヘア", "ウルフカット", "ニュアンスウルフ"
  ],
  "パーマ系(2026春トレンド)": [
    "ツイストスパイラルパーマ", "波巻きツイストスパイラル",
    "波巻きスパイラル", "波巻きパーマ",
    "シャドウパーマ", "縦落ちシャドウパーマ", "ツイストシャドウパーマ",
    "フェザーパーマ", "メッシュパーマ", "ピンパーマ",
    "コームツイスト", "ソフトツイストパーマ",
    "縦落ちパーマ", "縦落ちツイスパ", "ニュアンスパーマ",
    "ナチュラルパーマ", "スパイラルパーマ"
  ],
  "カラー系": [
    "メンズカラー", "ハイライト", "ブリーチ", "グレージュ",
    "アッシュ", "ダブルカラー", "ミルクティー",
    "暗髪", "ナチュラルブラウン"
  ],
  "ケア系": ["髪質改善", "眉毛", "縮毛矯正", "トリートメント", "ヘッドスパ"],
  "テイスト": [
    "ナチュラル", "韓国風", "韓流", "清潔感",
    "ビジネス", "モテ髪", "爽やか", "大人メンズ"
  ]
};

const templates = {
  styleName: [
    "波巻きツイストスパイラル/リバースセンターパート/",
    "MEN'S/ニュアンスパーマ/ニュアンスウルフ/"
  ],
  comment: "men's/メンズ/メンズパーマ/メンズカット/メンズカラー/学割U24/軽めマッシュ 波巻きスパイラル フェザーカット メッシュパーマ ナチュラルツーブロック ナチュラルアップバング 縦落ちシャドウパーマ コームツイスト サンウォンヘア フェザーパーマ",
  menu: "波巻きスパイラルパーマ 縦落ちパーマ 縦落ちツイスパ ハーフアップバング フレンチクロップ"
};

const limits = { styleName: 30, comment: 120, menu: 50, hashtags: 20 };

const state = {
  styleName: "", comment: "", menu: "",
  hashtags: [], activeField: "styleName", copiedField: null
};

function addWord(word) {
  if (state.activeField === "hashtags") {
    if (state.hashtags.length >= limits.hashtags) return;
    if (state.hashtags.includes(word)) return;
    state.hashtags.push(word);
    render(); return;
  }
  const sep = state.activeField === "styleName" ? "/" : " ";
  const cur = state[state.activeField];
  const next = cur ? cur + sep + word : word;
  if (next.length > limits[state.activeField]) return;
  state[state.activeField] = next;
  render();
}

function removeHashtag(tag) {
  state.hashtags = state.hashtags.filter(t => t !== tag);
  render();
}

function setActiveField(field) { state.activeField = field; render(); }

function updateInput(value) {
  if (value.length > limits[state.activeField]) return;
  state[state.activeField] = value;
  render();
}

function copyToClipboard(text, fieldName) {
  if (!text) return;
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  state.copiedField = fieldName; render();
  setTimeout(() => { state.copiedField = null; render(); }, 1500);
}

function copyAll() {
  const parts = [];
  if (state.styleName) parts.push("■スタイル名\n" + state.styleName);
  if (state.comment) parts.push("■コメント\n" + state.comment);
  if (state.menu) parts.push("■メニュー内容\n" + state.menu);
  if (state.hashtags.length > 0) parts.push("■ハッシュタグ\n" + state.hashtags.map(t => "#" + t).join(" "));
  copyToClipboard(parts.join("\n\n"), "all");
}

function resetAll() {
  if (confirm("全ての入力をリセットしますか？")) {
    state.styleName = ""; state.comment = ""; state.menu = "";
    state.hashtags = []; render();
  }
}

function applyTemplate(type, index) {
  if (type === "styleName") state.styleName = templates.styleName[index];
  else if (type === "comment") state.comment = templates.comment.slice(0, limits.comment);
  else if (type === "menu") state.menu = templates.menu.slice(0, limits.menu);
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

const fieldConfig = {
  styleName: { label: "スタイル名", icon: "①" },
  comment:   { label: "コメント",   icon: "②" },
  menu:      { label: "メニュー内容", icon: "③" },
  hashtags:  { label: "ハッシュタグ", icon: "④" }
};

function render() {
  const af = state.activeField;
  const cur = af === "hashtags" ? state.hashtags.length
            : state[af].length;
  const lim = limits[af];

  const tabsHtml = Object.keys(fieldConfig).map(key => {
    const isActive = af === key;
    return `
      <button onclick="setActiveField('${key}')"
        class="py-2.5 px-1 rounded-lg text-xs font-bold transition-all ${isActive ? 'bg-white text-zinc-950 shadow-md' : 'bg-zinc-800 text-zinc-400 border border-zinc-700'}">
        <div class="text-base mb-0.5">${fieldConfig[key].icon}</div>
        <div class="leading-tight">${fieldConfig[key].label}</div>
      </button>`;
  }).join("");

  // テンプレートボタン
  let templateHtml = "";
  if (af === "styleName") {
    templateHtml = `
      <div class="mb-3 space-y-1.5">
        <p class="text-xs text-zinc-500 font-bold">📋 テンプレ（タップで挿入）</p>
        <button onclick="applyTemplate('styleName', 0)"
          class="w-full text-left px-3 py-2 bg-zinc-800 text-zinc-300 text-xs rounded-lg border border-zinc-700">
          ①波巻きツイストスパイラル/リバースセンターパート/○○
        </button>
        <button onclick="applyTemplate('styleName', 1)"
          class="w-full text-left px-3 py-2 bg-zinc-800 text-zinc-300 text-xs rounded-lg border border-zinc-700">
          ②MEN'S/ニュアンスパーマ/ニュアンスウルフ/○○
        </button>
      </div>`;
  } else if (af === "comment") {
    templateHtml = `
      <div class="mb-3">
        <p class="text-xs text-zinc-500 font-bold mb-1.5">📋 テンプレ（タップで挿入）</p>
        <button onclick="applyTemplate('comment')"
          class="w-full text-left px-3 py-2 bg-zinc-800 text-zinc-300 text-xs rounded-lg border border-zinc-700 leading-relaxed">
          men's/メンズ/メンズパーマ/メンズカット...（120文字テンプレ）
        </button>
      </div>`;
  } else if (af === "menu") {
    templateHtml = `
      <div class="mb-3">
        <p class="text-xs text-zinc-500 font-bold mb-1.5">📋 テンプレ（タップで挿入）</p>
        <button onclick="applyTemplate('menu')"
          class="w-full text-left px-3 py-2 bg-zinc-800 text-zinc-300 text-xs rounded-lg border border-zinc-700">
          波巻きスパイラルパーマ 縦落ちパーマ 縦落ちツイスパ...
        </button>
      </div>`;
  }

  let activeAreaHtml = "";
  if (af === "hashtags") {
    activeAreaHtml = state.hashtags.length === 0
      ? `<p class="text-zinc-600 text-sm py-8 text-center">下のワードをタップして追加</p>`
      : `<div class="flex flex-wrap gap-2">${state.hashtags.map(tag => `
          <button onclick="removeHashtag('${escapeHtml(tag)}')"
            class="inline-flex items-center gap-1 px-3 py-1.5 bg-zinc-800 hover:bg-red-900 text-zinc-300 hover:text-red-300 rounded-full text-sm font-medium transition-colors">
            <span class="text-zinc-500">#</span>${escapeHtml(tag)}
            <span class="ml-0.5 text-xs opacity-50">×</span>
          </button>`).join("")}</div>`;
  } else {
    const val = state[af];
    const placeholder = af === "styleName" ? "例：波巻きツイストスパイラル/リバースセンターパート/渋谷"
      : af === "comment" ? "例：men's/メンズ/メンズパーマ/..."
      : "例：波巻きスパイラルパーマ 縦落ちパーマ...";
    activeAreaHtml = `
      <textarea oninput="updateInput(this.value)" placeholder="${placeholder}"
        class="w-full min-h-[100px] resize-none bg-transparent text-zinc-100 placeholder-zinc-700 focus:outline-none text-sm leading-relaxed">${escapeHtml(val)}</textarea>`;
  }

  const wordsHtml = Object.keys(wordBank).map(category => `
    <div class="bg-zinc-900 rounded-xl p-3 border border-zinc-800">
      <h3 class="text-xs font-bold text-zinc-300 mb-2 px-1 flex items-center gap-1.5">
        <span class="w-1 h-3 bg-white rounded-full"></span>${category}
      </h3>
      <div class="flex flex-wrap gap-1.5">
        ${wordBank[category].map(w => {
          const used = af === "hashtags" && state.hashtags.includes(w);
          return `
            <button onclick="addWord('${escapeHtml(w)}')" ${used ? 'disabled' : ''}
              class="px-3 py-1.5 rounded-full text-xs font-medium transition-all active:scale-95 ${used ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed' : 'bg-zinc-800 hover:bg-white hover:text-zinc-950 text-zinc-300 border border-zinc-700'}">
              ${used ? '✓ ' : ''}${escapeHtml(w)}
            </button>`;
        }).join("")}
      </div>
    </div>`).join("");

  const hasAny = state.styleName || state.comment || state.menu || state.hashtags.length > 0;
  const allHtml = hasAny ? `
    <div class="bg-zinc-900 rounded-xl p-4 border border-zinc-700 mt-6">
      <h3 class="text-xs font-bold text-zinc-300 mb-3">✨ 全部まとめてコピー</h3>
      <button onclick="copyAll()"
        class="w-full py-3 bg-white text-zinc-950 text-sm font-bold rounded-lg active:scale-[0.99] transition-all">
        ${state.copiedField === 'all' ? '✓ 全項目コピー完了！' : '📋 全項目をまとめてコピー'}
      </button>
    </div>` : "";

  const canCopy = (af === "hashtags" && state.hashtags.length > 0) || (af !== "hashtags" && state[af]);
  const isCopying = state.copiedField === af;
  const copyText = af === "hashtags" ? state.hashtags.join('\n') : state[af];

  document.getElementById("app").innerHTML = `
    <div class="min-h-screen">
      <!-- ヘッダー -->
      <div class="sticky top-0 z-20 bg-zinc-950 border-b-2 border-white">
        <div class="px-5 py-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-base">✂️</span>
              <h1 class="text-lg font-black tracking-tight text-white">HPB SEO MEN's</h1>
            </div>
            <button onclick="resetAll()" class="text-zinc-500 text-xs underline">リセット</button>
          </div>
          <p class="text-xs text-zinc-500 mt-1 font-medium">タップで追加 → コピーで完了</p>
        </div>
      </div>

      <div class="px-4 py-5 space-y-4 pb-32">
        <!-- タブ -->
        <div class="grid grid-cols-4 gap-1.5">${tabsHtml}</div>

        <!-- 入力エリア -->
        <div class="bg-zinc-900 rounded-2xl border-2 border-white overflow-hidden shadow-sm">
          <div class="px-4 py-3 bg-white text-zinc-950 flex items-center justify-between">
            <span class="text-sm font-bold">${fieldConfig[af].label}</span>
            <span class="text-sm font-mono font-bold ${cur >= lim ? 'text-red-500' : 'text-zinc-500'}">
              ${cur}<span class="text-zinc-400 font-normal">/${lim}</span>
            </span>
          </div>
          <div class="p-4">
            ${templateHtml}
            ${activeAreaHtml}
          </div>
          <button onclick="copyToClipboard('${escapeHtml(copyText)}', '${af}')"
            ${!canCopy ? 'disabled' : ''}
            class="w-full py-3.5 ${canCopy ? 'bg-white text-zinc-950' : 'bg-zinc-800 text-zinc-600'} text-sm font-bold transition-all active:scale-[0.99]">
            ${isCopying ? '✓ コピー完了！' : '📋 コピーする'}
          </button>
        </div>

        <!-- ワード選択 -->
        <div class="space-y-3">
          <h2 class="text-xs font-bold text-zinc-500 px-1 tracking-wider uppercase">タップで追加</h2>
          ${wordsHtml}
        </div>

        ${allHtml}

        <!-- 使い方 -->
        <details class="bg-zinc-900 rounded-xl p-4 border border-zinc-800 mt-4">
          <summary class="text-xs font-bold text-zinc-400 cursor-pointer">💡 使い方</summary>
          <div class="mt-3 space-y-2 text-xs text-zinc-500 leading-relaxed">
            <p>1. 上のタブで入力したい項目を選ぶ（①〜④）</p>
            <p>2. テンプレをタップして雛形を挿入</p>
            <p>3. ○○の部分にエリア名を追加入力</p>
            <p>4. 下のワードリストからタップして追加</p>
            <p>5. 「コピーする」→ サロンボードに貼り付け</p>
          </div>
        </details>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
