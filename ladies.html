<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="HPB SEO" />
<title>HPB SEO Helper - AITOKYO HAIR</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✨%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Hiragino Sans", "Noto Sans JP", -apple-system, sans-serif; margin: 0; -webkit-font-smoothing: antialiased; }
  textarea { font-family: inherit; }
  html, body { overscroll-behavior-y: contain; }
</style>
</head>
<body class="bg-stone-50">
<div id="app"></div>
<script>
const wordBank = {
  "🔥AITOKYO実績": [
    "ウルフボブ", "ウルフカット", "レイヤーボブ", "レイヤー"
  ],
  "エリア": ["渋谷", "渋谷美容室", "名古屋", "名古屋美容室"],
  "カット系(2026春トレンド)": [
    "レイヤー", "レイヤーボブ", "ハッシュカット",
    "くびれレイヤーボブ", "顔まわりレイヤー", "ハッシュレイヤー",
    "結べるレイヤーカット", "ワンホンレイヤー", "韓国風レイヤー",
    "丸みショートボブ", "切りっぱなしボブ", "ナチュラルロング",
    "姫カット", "姫カットレイヤー", "エフォートレスレイヤー",
    "クラゲウルフ", "ウルフカット", "ハンサムショートウルフ"
  ],
  "カラー系(2026春トレンド)": [
    "ミルクティーブロンド", "ミルクティーベージュ", "暗髪",
    "ほっこりカラー", "シアーグレージュ", "ラテグレージュ",
    "ミルクグレージュ", "ミルクティーピンクベージュ",
    "ダークラベンダー", "グレージュブラウン",
    "インナーカラー", "ハイライト", "白髪ぼかし",
    "ブリーチ", "ダブルカラー", "アンブレラカラー",
    "逆アンブレラカラー", "ナチュラルブラウン"
  ],
  "パーマ系": [
    "デジタルパーマ", "コテ巻き風パーマ", "韓国巻き", "あみたらし",
    "波巻きパーマ", "ナチュラルパーマ", "ゆるふわパーマ",
    "エアリーパーマ"
  ],
  "ケア系": [
    "髪質改善", "酸性ストレート", "縮毛矯正", "トリートメント",
    "髪質改善トリートメント", "サラツヤ髪", "ツヤ髪"
  ],
  "テイスト": [
    "ナチュラル", "エフォートレス", "韓国風", "韓国ヘア",
    "大人可愛い", "大人ナチュラル", "モテ髪", "小顔ヘア",
    "小顔カット"
  ]
};

const limits = { styleName: 30, comment: 120, menu: 50, hashtags: 20 };

const templates = {
  styleName: [
    "ミルクティーブロンド/ダークブルー/デジタルパーマ/",
    "ワンホンレイヤー/ミルクティーブロンド/ダークブルー/"
  ],
  comment: "くびれレイヤーボブ あみたらし ハンサムショートウルフ 逆アンブレラカラー くびれレイヤー 韓国巻き ハッシュレイヤー ダークラベンダー グレージュブラウン 結べるレイヤーカット ラテグレージュ ミルクグレージュ ミルクティーピンクベージュ"
};

function applyTemplate(type, index) {
  if (type === "styleName") state.styleName = templates.styleName[index].slice(0, limits.styleName);
  else if (type === "comment") state.comment = templates.comment.slice(0, limits.comment);
  render();
}

const state = {
  styleName: "", comment: "", menu: "",
  hashtags: [], activeField: "styleName", copiedField: null
};

function addWord(word) {
  if (state.activeField === "hashtags") {
    if (state.hashtags.length >= limits.hashtags) return;
    if (state.hashtags.includes(word)) return;
    state.hashtags.push(word);
    render(); return;
  }
  const sep = state.activeField === "styleName" ? "/" : " ";
  const cur = state[state.activeField];
  const next = cur ? cur + sep + word : word;
  if (next.length > limits[state.activeField]) return;
  state[state.activeField] = next;
  render();
}

function removeHashtag(tag) {
  state.hashtags = state.hashtags.filter(t => t !== tag);
  render();
}

function setActiveField(field) { state.activeField = field; render(); }

function updateInput(value) {
  if (value.length > limits[state.activeField]) return;
  state[state.activeField] = value;
  render();
}

function copyToClipboard(text, fieldName) {
  if (!text) return;
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(fallback);
  } else { fallback(); }
  state.copiedField = fieldName; render();
  setTimeout(() => { state.copiedField = null; render(); }, 1500);
}

function copyAll() {
  const parts = [];
  if (state.styleName) parts.push("■スタイル名\n" + state.styleName);
  if (state.comment) parts.push("■コメント\n" + state.comment);
  if (state.menu) parts.push("■メニュー内容\n" + state.menu);
  if (state.hashtags.length > 0) parts.push("■ハッシュタグ\n" + state.hashtags.map(t => "#" + t).join(" "));
  copyToClipboard(parts.join("\n\n"), "all");
}

function resetAll() {
  if (confirm("全ての入力をリセットしますか？")) {
    state.styleName = ""; state.comment = ""; state.menu = "";
    state.hashtags = []; render();
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

const fieldConfig = {
  styleName: { label: "スタイル名", icon: "①" },
  comment:   { label: "コメント",   icon: "②" },
  menu:      { label: "メニュー内容", icon: "③" },
  hashtags:  { label: "ハッシュタグ", icon: "④" }
};

function render() {
  const af = state.activeField;
  const cur = af === "hashtags" ? state.hashtags.length : state[af].length;
  const lim = limits[af];

  const tabsHtml = Object.keys(fieldConfig).map(key => {
    const isActive = af === key;
    return `
      <button onclick="setActiveField('${key}')"
        class="py-2.5 px-1 rounded-lg text-xs font-bold transition-all ${isActive ? 'bg-stone-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200'}">
        <div class="text-base mb-0.5">${fieldConfig[key].icon}</div>
        <div class="leading-tight">${fieldConfig[key].label}</div>
      </button>`;
  }).join("");

  let activeAreaHtml = "";
  if (af === "hashtags") {
    activeAreaHtml = state.hashtags.length === 0
      ? `<p class="text-stone-400 text-sm py-8 text-center">下のワードをタップして追加</p>`
      : `<div class="flex flex-wrap gap-2">${state.hashtags.map(tag => `
          <button onclick="removeHashtag('${escapeHtml(tag)}')"
            class="inline-flex items-center gap-1 px-3 py-1.5 bg-stone-100 hover:bg-rose-100 text-stone-800 hover:text-rose-700 rounded-full text-sm font-medium transition-colors">
            <span class="text-stone-400">#</span>${escapeHtml(tag)}
            <span class="ml-0.5 text-xs opacity-50">×</span>
          </button>`).join("")}</div>`;
  } else {
    const val = state[af];
    const placeholder = af === "styleName" ? "例：ワンホンレイヤー/ミルクティーブロンド/..."
      : af === "comment" ? "例：渋谷/くびれレイヤーボブ あみたらし..."
      : "例：渋谷/丸みショートボブ コテ巻き風パーマ...";
    activeAreaHtml = `
      <textarea oninput="updateInput(this.value)" placeholder="${placeholder}"
        class="w-full min-h-[100px] resize-none text-stone-900 placeholder-stone-300 focus:outline-none text-sm leading-relaxed">${escapeHtml(val)}</textarea>`;
  }

  // テンプレートボタン
  let templateHtml = "";
  if (af === "styleName") {
    templateHtml = `
      <div class="mb-3 space-y-1.5">
        <p class="text-xs text-stone-500 font-bold">📋 テンプレ（タップで挿入）</p>
        <button onclick="applyTemplate('styleName', 0)"
          class="w-full text-left px-3 py-2 bg-amber-50 hover:bg-amber-100 text-stone-800 text-xs rounded-lg border border-amber-200 leading-relaxed">
          ①ミルクティーブロンド/ダークブルー/デジタルパーマ/○○
        </button>
        <button onclick="applyTemplate('styleName', 1)"
          class="w-full text-left px-3 py-2 bg-amber-50 hover:bg-amber-100 text-stone-800 text-xs rounded-lg border border-amber-200 leading-relaxed">
          ②ワンホンレイヤー/ミルクティーブロンド/ダークブルー/○○
        </button>
        <p class="text-[10px] text-stone-400">※○○にエリア名を入力してください</p>
      </div>`;
  } else if (af === "comment") {
    templateHtml = `
      <div class="mb-3">
        <p class="text-xs text-stone-500 font-bold mb-1.5">📋 テンプレ（タップで挿入）</p>
        <button onclick="applyTemplate('comment')"
          class="w-full text-left px-3 py-2 bg-amber-50 hover:bg-amber-100 text-stone-800 text-xs rounded-lg border border-amber-200 leading-relaxed">
          くびれレイヤーボブ あみたらし ハンサムショートウルフ 逆アンブレラカラー...（120文字テンプレ）
        </button>
      </div>`;
  }

  const wordsHtml = Object.keys(wordBank).map(category => `
    <div class="bg-white rounded-xl p-3 border border-stone-200">
      <h3 class="text-xs font-bold text-stone-900 mb-2 px-1 flex items-center gap-1.5">
        <span class="w-1 h-3 bg-stone-900 rounded-full"></span>${category}
      </h3>
      <div class="flex flex-wrap gap-1.5">
        ${wordBank[category].map(w => {
          const used = af === "hashtags" && state.hashtags.includes(w);
          return `
            <button onclick="addWord('${escapeHtml(w)}')" ${used ? 'disabled' : ''}
              class="px-3 py-1.5 rounded-full text-xs font-medium transition-all active:scale-95 ${used ? 'bg-stone-100 text-stone-300 cursor-not-allowed' : 'bg-stone-50 hover:bg-stone-900 hover:text-white text-stone-700 border border-stone-200'}">
              ${used ? '✓ ' : ''}${escapeHtml(w)}
            </button>`;
        }).join("")}
      </div>
    </div>`).join("");

  const hasAny = state.styleName || state.comment || state.menu || state.hashtags.length > 0;
  const allHtml = hasAny ? `
    <div class="bg-gradient-to-br from-amber-50 to-rose-50 rounded-xl p-4 border border-amber-200 mt-6">
      <h3 class="text-xs font-bold text-stone-900 mb-3">✨ 全部まとめてコピー</h3>
      <button onclick="copyAll()"
        class="w-full py-3 bg-white text-stone-900 text-sm font-bold rounded-lg border-2 border-stone-900 active:scale-[0.99] transition-all">
        ${state.copiedField === 'all' ? '✓ 全項目コピー完了！' : '📋 全項目をまとめてコピー'}
      </button>
    </div>` : "";

  const canCopy = (af === "hashtags" && state.hashtags.length > 0) || (af !== "hashtags" && state[af]);
  const isCopying = state.copiedField === af;
  const copyText = af === "hashtags" ? state.hashtags.join('\n') : state[af];

  document.getElementById("app").innerHTML = `
    <div class="min-h-screen">
      <div class="sticky top-0 z-20 bg-white border-b-2 border-stone-900">
        <div class="px-5 py-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-base">✨</span>
              <h1 class="text-lg font-black tracking-tight text-stone-900">HPB SEO HELPER</h1>
            </div>
            <button onclick="resetAll()" class="text-stone-500 text-xs underline">リセット</button>
          </div>
          <p class="text-xs text-stone-500 mt-1 font-medium">タップで追加 → コピーで完了</p>
        </div>
      </div>

      <div class="px-4 py-5 space-y-4 pb-32">
        <div class="grid grid-cols-4 gap-1.5">${tabsHtml}</div>

        <div class="bg-white rounded-2xl border-2 border-stone-900 overflow-hidden shadow-sm">
          <div class="px-4 py-3 bg-stone-900 text-white flex items-center justify-between">
            <span class="text-sm font-bold">${fieldConfig[af].label}</span>
            <span class="text-sm font-mono font-bold ${cur >= lim ? 'text-rose-300' : 'text-white'}">
              ${cur}<span class="text-stone-400 font-normal">/${lim}</span>
            </span>
          </div>
          <div class="p-4">
            ${templateHtml}
            ${activeAreaHtml}
          </div>
          <button onclick="copyToClipboard('${escapeHtml(copyText)}', '${af}')"
            ${!canCopy ? 'disabled' : ''}
            class="w-full py-3.5 ${canCopy ? 'bg-stone-900' : 'bg-stone-300'} text-white text-sm font-bold transition-all active:scale-[0.99]">
            ${isCopying ? '✓ コピー完了！' : '📋 コピーする'}
          </button>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-bold text-stone-500 px-1 tracking-wider uppercase">タップで追加</h2>
          ${wordsHtml}
        </div>

        ${allHtml}

        <details class="bg-white rounded-xl p-4 border border-stone-200 mt-4">
          <summary class="text-xs font-bold text-stone-700 cursor-pointer">💡 使い方</summary>
          <div class="mt-3 space-y-2 text-xs text-stone-600 leading-relaxed">
            <p>1. 上のタブで入力したい項目を選ぶ（①〜④）</p>
            <p>2. 下のワードリストからタップして追加</p>
            <p>3. 直接入力もOK</p>
            <p>4. 「コピーする」ボタンを押す</p>
            <p>5. サロンボードの該当欄に貼り付け</p>
          </div>
        </details>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
